name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install dependencies
        run: npm ci

      - name: Restore Firebase Android config
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "Missing GitHub secret: ANDROID_GOOGLE_SERVICES_JSON_BASE64" >&2
            exit 1
          fi

          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: blink-android-release-apks
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
